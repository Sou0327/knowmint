name = "knowmint"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# 環境変数は Cloudflare Dashboard の Workers → Settings → Environment variables に設定
# NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
# NEXT_PUBLIC_SOLANA_RPC_URL, NEXT_PUBLIC_SOLANA_NETWORK, WEBHOOK_SIGNING_KEY,
# UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN, ALLOWED_ORIGIN, INDEXNOW_KEY 等

# GEO-6.1: HTTP→HTTPS リダイレクトは Cloudflare Dashboard で設定
# SSL/TLS → Edge Certificates → "Always Use HTTPS" を有効化すること
